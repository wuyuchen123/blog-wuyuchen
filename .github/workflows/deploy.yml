name: Deploy VitePress Pages
on:
  push:
    branches: [ main ]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
      - name: 配置Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 安装依赖并打包站点
        run: |
          npm install
          npm run docs:build
      - name: 上传静态网站文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist
      - name: 部署到GitHub Pages
        uses: actions/deploy-pages@v4
